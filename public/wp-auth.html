<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WordPress.com 認証</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
    .token-box { background: #f0f0f0; padding: 16px; border-radius: 8px; word-break: break-all; font-family: monospace; font-size: 13px; }
    .success { color: green; font-weight: bold; }
    .error { color: red; }
    button { margin-top: 12px; padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>WordPress.com 認証完了</h2>
  <div id="result"></div>
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');
    const div = document.getElementById('result');
    if (token) {
      div.innerHTML = `
        <p class="success">✅ アクセストークン取得成功！</p>
        <p>以下のトークンをコピーしてClaudeに貼り付けてください：</p>
        <div class="token-box" id="token">${token}</div>
        <button onclick="navigator.clipboard.writeText('${token}').then(()=>alert('コピーしました！'))">コピー</button>
      `;
    } else {
      div.innerHTML = '<p class="error">トークンが見つかりません。もう一度お試しください。</p>';
    }
  </script>
</body>
</html>
